name: Update documentation site

on:
  push:
    # The docsite publishes from the v2 branch for now
    branches: [v2]
    paths:
      - 'docs/**'
      - .github/workflows/docsite.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  docs:
    name: Update docs

    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # TODO (release): release from main
      - name: Verify v2 branch
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/v2" ]]; then
            echo "Releases can only be triggered from the v2 branch."
            exit 1
          fi

      # The docs have a separate installation
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc

      - name: Install docs dependencies
        working-directory: docs
        run: yarn --immutable

      - name: Build doc site
        working-directory: docs
        run: yarn build

      - name: Upload site as artifact
        id: deployment
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: docs
    permissions:
      # to deploy to Pages
      pages: write
      # to verify the deployment originates from an appropriate source
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
